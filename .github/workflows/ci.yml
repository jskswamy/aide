name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Check coverage threshold
        run: |
          # Exclude cmd/aide/ (Cobra wiring) and generated mocks from total
          grep -v "github.com/jskswamy/aide/cmd/" coverage.out | grep -v "/mocks/" > coverage-filtered.out
          TOTAL=$(go tool cover -func=coverage-filtered.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage (excluding cmd/aide and mocks): ${TOTAL}%"
          if [ "$(echo "$TOTAL < 60" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below minimum threshold of 60%"
            exit 1
          fi

      - name: Check security-critical package coverage
        run: |
          FAILED=0
          for PKG in pkg/seatbelt internal/sandbox internal/secrets; do
            # Exclude generated mocks from per-package calculation
            COV=$(go tool cover -func=coverage.out | grep "github.com/jskswamy/aide/${PKG}/" | grep -v "/mocks/" | awk '{sum += $3; n++} END {if (n>0) print sum/n; else print 0}' | tr -d '%')
            if [ -z "$COV" ] || [ "$COV" = "0" ]; then
              echo "::warning::No coverage data for ${PKG}"
              continue
            fi
            echo "${PKG}: ${COV}%"
            if [ "$(echo "$COV < 80" | bc -l)" -eq 1 ]; then
              echo "::error::${PKG} coverage ${COV}% is below security-critical threshold of 80%"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Check generated mocks are up to date
        run: |
          go install go.uber.org/mock/mockgen@latest
          go generate ./...
          if ! git diff --quiet -- '*/mocks/'; then
            echo "::error::Generated mocks are out of date. Run 'make generate' and commit."
            git diff -- '*/mocks/'
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  sast-gosec:
    name: Security Scan (gosec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Install tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install github.com/mikefarah/yq/v4@latest

      - name: Run gosec
        run: |
          EXCLUDE=$(yq -r '.exclude | keys | join(",")' .gosec.yaml)
          gosec -exclude="$EXCLUDE" -fmt sarif -out gosec-results.sarif ./... || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Build
        run: make build
